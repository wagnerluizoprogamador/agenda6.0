<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Clientes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <a href="agenda.html">Agenda</a>
            <a href="index.html">Cadastros</a>
            <a href="clientes.html" class="ativo">Clientes</a>
            <a href="servicos.html">Serviços</a>
            <a href="funcionarios.html">Funcionários</a>
            <a href="financeiro.html">Financeiro</a>
            <a href="comissoes.html">Comissões</a>
        </nav>
    </header>

    <main>
        <section class="form-container">
            <h2>Lista de Clientes</h2>
            <div id="lista-clientes-container">
                <table id="tabela-clientes">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Telefone</th>
                            <th>Endereço</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
        </section>

        <div id="modal-editar-cliente" class="modal">
            <section class="form-container">
                <button id="fechar-modal-cliente" class="fechar-modal-btn">×</button>
                <h2>Editar Cliente</h2>
                <form id="form-editar-cliente">
                    <input type="hidden" id="cliente-id">
                    <div class="form-group">
                        <label for="nome-cliente-edicao">Nome:</label>
                        <input type="text" id="nome-cliente-edicao" required>
                    </div>
                    <div class="form-group">
                        <label for="telefone-cliente-edicao">Telefone:</label>
                        <input type="tel" id="telefone-cliente-edicao">
                    </div>
                    <div class="form-group">
                        <label for="endereco-cliente-edicao">Endereço:</label>
                        <input type="text" id="endereco-cliente-edicao">
                    </div>
                    <button type="submit">Salvar Alterações</button>
                </form>
            </section>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
