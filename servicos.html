<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento de Serviços</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="pagina-servicos">
    <header>
        <nav>
            <a href="agenda.html">Agenda</a>
            <a href="index.html">Cadastros</a>
            <a href="clientes.html">Clientes</a>
            <a href="servicos.html" class="ativo">Serviços</a>
            <a href="funcionarios.html">Funcionários</a>
            <a href="financeiro.html">Financeiro</a>
            <a href="comissoes.html">Comissões</a>
        </nav>
    </header>

    <main>
        <section class="form-container">
            <h2>Cadastro de Serviço</h2>
            <form id="form-cadastro-servico">
                <div class="form-group">
                    <label for="nome-servico">Nome do Serviço:</label>
                    <input type="text" id="nome-servico" name="nome-servico" required>
                </div>
                <div class="form-group">
                    <label for="preco-servico">Preço (R$):</label>
                    <input type="number" step="0.01" id="preco-servico" name="preco-servico" required>
                </div>
                <button type="submit">Cadastrar Serviço</button>
            </form>
        </section>

        <section class="lista-container">
            <h2>Serviços Cadastrados</h2>
            <ul id="lista-servicos"></ul>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
