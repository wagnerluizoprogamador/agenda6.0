<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento - Minha Agenda 6.0</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto+Mono|Roboto+Slab|Roboto:300,400,500,700" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="modal-agendamento">
        <div class="modal-header">
            <h3>Criando Atendimento</h3>
        </div>
        
        <form id="form-agendamento">
            <div class="form-group">
                <label for="data">Data</label>
                <input type="date" id="data" value="2025-08-22">
            </div>

            <div class="form-group">
                <label for="hora-inicio">Hora Início</label>
                <input type="time" id="hora-inicio" value="09:00">
            </div>

            <div class="form-group">
                <label for="profissional-principal">Profissional Principal</label>
                <div class="comissao-wrapper">
                    <select id="profissional-principal">
                        <option value="">Selecione um profissional</option>
                        <option value="1">Arthur Brayan</option>
                        <option value="2">Profissional B</option>
                        <option value="3">Profissional C</option>
                    </select>
                    <input type="number" id="comissao-principal" placeholder="%" value="100">
                </div>
            </div>

            <div id="ajudantes-container">
                </div>

            <button type="button" class="btn-adicionar-ajudante" id="btn-adicionar-ajudante">+ Adicionar Ajudante</button>

            <div class="form-group">
                <label for="cliente">Cliente</label>
                <input type="text" id="cliente" placeholder="Digite para buscar...">
            </div>

            <div class="form-group">
                <label for="servico">Serviço</label>
                <input type="text" id="servico" placeholder="Digite para buscar ou selecione...">
            </div>

            <div class="form-group">
                <label for="valor-total">Valor Total</label>
                <input type="number" id="valor-total" value="150.00">
            </div>
            
            <div class="resumo-comissao">
                <h4>Resumo de Comissões</h4>
                <p>Soma das Comissões: <span id="soma-porcentagem">100</span>%</p>
                <p>Comissão do Profissional Principal: R$ <span id="valor-comissao-principal">150.00</span></p>
                <p id="resumo-ajudante1" class="resumo-ajudante" style="display:none;"></p>
                <p id="resumo-ajudante2" class="resumo-ajudante" style="display:none;"></p>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn-fechar">Fechar</button>
                <button type="submit" class="btn-salvar">Salvar</button>
            </div>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
